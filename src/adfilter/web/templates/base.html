<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — adfilter</title>
    <style>
        :root {
            --bg: #0d1117; --fg: #c9d1d9; --accent: #58a6ff;
            --card-bg: #161b22; --border: #30363d; --success: #3fb950;
            --warning: #d29922; --error: #f85149;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--fg);
            padding: 0; line-height: 1.6;
        }
        nav {
            background: var(--card-bg); border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem; display: flex; align-items: center; gap: 2rem;
        }
        nav .brand { font-weight: bold; font-size: 1.1rem; color: var(--accent); text-decoration: none; }
        nav a { color: var(--fg); text-decoration: none; font-size: 0.9rem; }
        nav a:hover { color: var(--accent); }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { margin-bottom: 1rem; }
        .card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.6rem 0.8rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { font-weight: 600; color: #8b949e; }
        code { background: #1c2128; padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.9em; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.75rem; }
        .badge-success { background: rgba(63, 185, 80, 0.15); color: var(--success); }
        .badge-warning { background: rgba(210, 153, 34, 0.15); color: var(--warning); }
        .badge-error { background: rgba(248, 81, 73, 0.15); color: var(--error); }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="brand">adfilter</a>
        <a href="/">Dashboard</a>
        <a href="/search">Search</a>
    </nav>
    <div class="container">
        {{ content }}
    </div>
</body>
</html>
