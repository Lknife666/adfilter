##########################################
## 默认订阅配置（可自行替换）。完整选项见 application-example.yaml
##########################################
application:
  config:
    input:
      rule:
        default:
          - name: anti-ad
            type: easylist
            path: https://anti-ad.net/easylist.txt

    output:
      path: ./rule
      file_header: |
        ADFS AdBlock ${type}
        Last Modified: ${date}
        Total Size: ${total}
        Description: ${desc}
        Homepage: https://github.com/Lknife666/adfilter
      files:
        - name: easylist.txt
          type: easylist
          desc: "ADFS EasyList"
          filter: [basic, wildcard, unknown]

        - name: dns.txt
          type: dns
          desc: "AdGuard Home DNS filter"
          filter: [basic, wildcard, unknown]

        - name: dnsmasq.conf
          type: dnsmasq
          desc: "dnsmasq address rules"
          filter: [basic, wildcard]

        - name: smartdns.conf
          type: smartdns
          desc: "smartdns address rules"
          filter: [basic, wildcard]

        - name: clash.yaml
          type: clash
          desc: "Clash domain rule-provider"
          filter: [basic, wildcard]

        - name: hosts.txt
          type: hosts
          desc: "/etc/hosts format"
          filter: [basic]

    fetcher:
      http:
        timeout_seconds: 60
        max_retries: 3

    parser:
      alert_length: 6
      min_length: 4
      max_length: 1024
      dns_probe:
        enable: false
