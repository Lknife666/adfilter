name: Update Filters

on:
  schedule:
    # every 8 hours, like the original project
    - cron: "0 */8 * * *"
  workflow_dispatch:
    inputs:
      release-branch:
        description: "Branch to publish generated rule files to"
        required: false
        default: "release"
        type: string
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - ".devcontainer/**"

env:
  TZ: Asia/Shanghai
  PYTHON_VERSION: "3.14"

permissions:
  contents: write

concurrency:
  group: update-filters
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync
      - name: Ruff check
        run: uvx ruff check src/
      - name: Import smoke test
        run: uv run python -c "import adfilter; print(adfilter.__version__)"

  build:
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      rule_count: ${{ steps.summary.outputs.rule_count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen --no-dev || uv sync --no-dev

      - name: Validate config
        run: uv run adfilter validate --config config/application.yaml

      - name: Build rule lists
        run: uv run adfilter run --config config/application.yaml --log-level INFO

      - name: Summarise output
        id: summary
        run: |
          echo "::group::Generated files"
          ls -lh rule/
          echo "::endgroup::"
          total=$(wc -l rule/* 2>/dev/null | tail -n 1 | awk '{print $1}')
          echo "rule_count=${total:-0}" >> "$GITHUB_OUTPUT"

      - name: Publish to release branch
        # Only publish on scheduled runs, manual dispatch, or main-branch pushes.
        if: >
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        env:
          RELEASE_BRANCH: ${{ github.event.inputs.release-branch || 'release' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Build an isolated publish workspace so the release branch contains
          # ONLY the generated rule files, never the source tree.
          pub=$(mktemp -d)
          cp -r rule/. "$pub/"
          date_now=$(date +'%Y-%m-%d %H:%M:%S %Z')
          cat > "$pub/README.md" <<EOF
          # adfilter — generated rule lists

          Auto-generated at **${date_now}**.

          | File | Format |
          | --- | --- |
          | \`easylist.txt\`  | EasyList / ABP |
          | \`dns.txt\`       | AdGuard Home |
          | \`dnsmasq.conf\`  | dnsmasq \`address=/…/ip\` |
          | \`smartdns.conf\` | smartdns \`address /…/#\` |
          | \`clash.yaml\`    | Clash domain rule-provider |
          | \`hosts.txt\`     | /etc/hosts |

          Total rules (all files): ${{ steps.summary.outputs.rule_count }}
          EOF

          cd "$pub"
          git init -q -b "$RELEASE_BRANCH"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add -A
          git commit -q -m "chore: auto release at ${date_now}"
          git push -q --force origin "$RELEASE_BRANCH"
