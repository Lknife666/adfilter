name: Update Filters

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:
    inputs:
      release-branch:
        description: "Branch to publish generated rule files to"
        required: false
        default: "release"
        type: string
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - ".devcontainer/**"

env:
  TZ: Asia/Shanghai
  PYTHON_VERSION: "3.14"

permissions:
  contents: write

concurrency:
  group: update-filters
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync
      - name: Ruff check
        run: uvx ruff check src/
      - name: Import smoke test
        run: uv run python -c "import adfilter; print(adfilter.__version__)"

  build:
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      rule_count: ${{ steps.summary.outputs.rule_count }}
      audit_passed: ${{ steps.audit.outputs.passed }}

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --no-dev || uv sync --no-dev

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/
            .adfilter-guard-state.json
          key: adfilter-build-cache-${{ github.run_number }}
          restore-keys: |
            adfilter-build-cache-

      - name: Validate config
        run: uv run adfilter validate --config config/application.yaml

      - name: Build rule lists
        timeout-minutes: 10
        run: |
          uv run adfilter run \
            --config config/application.yaml \
            --log-level INFO \
            --report rule/build-report.json

      - name: Record source scores
        run: |
          uv run python -c "
          import json, time
          from pathlib import Path
          from adfilter.quality.source_scorer import SourceScorer

          report = json.loads(Path('rule/build-report.json').read_text())
          scorer = SourceScorer(cache_file='.cache/source_scores.json')

          for src in report.get('sources', []):
              scorer.record_fetch(
                  source_id=src['name'],
                  success=src.get('effective', 0) > 0,
                  duration_ms=src.get('elapsed_ms', 0),
                  rule_count=src.get('effective', 0),
              )

          scores = scorer.compute_scores()
          print('Source Quality Scores:')
          for sid, s in sorted(scores.items(), key=lambda x: -x[1].overall_score):
              print(f'  {s.grade} {sid}: {s.overall_score:.1f} (avail={s.availability:.0%}, fresh={s.freshness:.0%})')
          "

      - name: Content security audit
        id: audit
        run: |
          uv run python -c "
          import json
          from pathlib import Path
          from adfilter.security.audit import AuditPolicy, ContentAuditor

          # Load policy
          policy = AuditPolicy.from_file('config/protected_domains.txt')
          auditor = ContentAuditor(policy)

          # Load generated dns.txt and extract domains
          dns_file = Path('rule/dns.txt')
          if not dns_file.exists():
              print('No dns.txt found, skipping audit')
              exit(0)

          domains = []
          for line in dns_file.read_text().splitlines():
              line = line.strip()
              if not line or line.startswith(('!', '#', '[')):
                  continue
              domain = line.lstrip('|').rstrip('^').strip()
              if domain and '.' in domain:
                  domains.append(domain)

          result = auditor.audit_domains('combined-output', domains)
          print(f'Audit: {len(domains)} domains checked')
          print(f'  Critical alerts: {result.critical_count}')
          print(f'  Warning alerts: {result.warning_count}')

          if not result.passed:
              for alert in result.alerts:
                  if alert.severity == 'critical':
                      print(f'::error::CRITICAL: {alert.message} (rule: {alert.rule})')
              print('::error::Content audit FAILED — protected domain would be blocked!')
              exit(1)

          for alert in result.alerts:
              if alert.severity == 'warning':
                  print(f'::warning::{alert.message}')

          print('Content audit PASSED')
          " && echo "passed=true" >> "$GITHUB_OUTPUT" || echo "passed=false" >> "$GITHUB_OUTPUT"

      - name: Generate index.html
        run: |
          uv run python -c "
          from adfilter.web.pages_generator import PagesGenerator
          gen = PagesGenerator(rule_dir='rule/', repo='${{ github.repository }}')
          gen.generate_index(output_path='rule/index.html')
          print('Generated rule/index.html')
          "

      - name: Generate build manifest
        run: |
          uv run python -c "
          from adfilter.build_guard import generate_manifest, write_manifest
          from pathlib import Path
          manifest = generate_manifest(
              Path('rule'),
              git_commit='${{ github.sha }}',
              adfilter_version='1.0.0',
          )
          write_manifest(Path('rule'), manifest)
          print(f'Manifest: {len(manifest.files)} files')
          "

      - name: Post-build safety checks
        run: |
          uv run python -c "
          from adfilter.build_guard import post_build_checks
          from pathlib import Path
          result = post_build_checks(Path('rule'))
          if not result.passed:
              for e in result.errors:
                  print(f'::error::{e}')
              raise SystemExit(1)
          for w in result.warnings:
              print(f'::warning::{w}')
          print('Post-build checks passed')
          "

      - name: Summarise output
        id: summary
        run: |
          echo "::group::Generated files"
          ls -lh rule/
          echo "::endgroup::"
          total=$(wc -l rule/*.txt rule/*.conf rule/*.yaml rule/*.rsc 2>/dev/null \
            | tail -n 1 | awk '{print $1}')
          echo "rule_count=${total:-0}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact for debugging
        uses: actions/upload-artifact@v4
        with:
          name: rule
          path: rule/
          if-no-files-found: error
          retention-days: 7

      - name: Save build cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            .cache/
            .adfilter-guard-state.json
          key: adfilter-build-cache-${{ github.run_number }}

      - name: Publish to release branch
        if: >
          steps.audit.outputs.passed == 'true' && (
            github.event_name == 'schedule' ||
            github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'push' && github.ref == 'refs/heads/main')
          )
        env:
          RELEASE_BRANCH: ${{ github.event.inputs.release-branch || 'release' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          pub=$(mktemp -d)
          cp -r rule/. "$pub/"
          date_now=$(date +'%Y-%m-%d %H:%M:%S %Z')
          cat > "$pub/README.md" <<EOF
          # adfilter — generated rule lists

          Auto-generated at **${date_now}** — every 8 hours.

          ## Subscribe

          Replace \`main\` with \`release\` in any raw GitHub URL, e.g.:
          \`\`\`
          https://raw.githubusercontent.com/${{ github.repository }}/release/dns.txt
          https://raw.githubusercontent.com/${{ github.repository }}/release/clash.yaml
          https://raw.githubusercontent.com/${{ github.repository }}/release/singbox.json
          \`\`\`

          | File | Format |
          | --- | --- |
          | \`easylist.txt\`  | EasyList / ABP |
          | \`dns.txt\`       | AdGuard Home |
          | \`dnsmasq.conf\`  | dnsmasq address= |
          | \`smartdns.conf\` | smartdns address |
          | \`clash.yaml\`    | Clash domain rule-provider |
          | \`hosts.txt\`     | /etc/hosts |
          | \`surge.conf\`    | Surge domain-set |
          | \`singbox.json\`  | sing-box rule-set (JSON) |
          | \`mikrotik.rsc\`  | MikroTik RouterOS /ip dns static |
          | \`unbound.conf\`  | Unbound local-zone |

          See \`build-report.json\` for per-file statistics. Total lines: ${{ steps.summary.outputs.rule_count }}.
          EOF

          cd "$pub"
          git init -q -b "$RELEASE_BRANCH"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add -A
          git commit -q -m "chore: auto release at ${date_now}"
          git push -q --force origin "$RELEASE_BRANCH"

  docker:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Repository name to lowercase
        id: repo
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.repo.outputs.image }}:latest
            ${{ steps.repo.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
