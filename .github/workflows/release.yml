name: Publish Release

on:
  workflow_run:
    workflows: ["Update Filters"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  PYTHON_VERSION: "3.14"

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: release
          fetch-depth: 1

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Checkout source for scripts
        uses: actions/checkout@v4
        with:
          ref: main
          path: _src
          sparse-checkout: |
            src/
            pyproject.toml
            config/protected_domains.txt

      - name: Install adfilter from source
        run: |
          cd _src && uv sync --frozen --no-dev || uv sync --no-dev
          cd ..

      - name: Determine release tag
        id: tag
        run: |
          DATE_TAG=$(date +'%Y-%m-%d')
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=Rules ${DATE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Run rule-set benchmark
        id: bench
        timeout-minutes: 5
        run: |
          cd _src
          BENCH_JSON=$(uv run adfilter bench --rule-dir "$GITHUB_WORKSPACE" --json --timeout 45 2>/dev/null || echo '{}')
          cd ..

          # Parse bench results
          BENCH_SECTION=$(python3 -c "
          import json, sys

          raw = '''${BENCH_JSON}'''
          try:
              d = json.loads(raw)
          except Exception:
              print('')
              sys.exit(0)

          if not d or not d.get('baselines'):
              print('')
              sys.exit(0)

          det = d.get('detection_rate', 0) * 100
          fp = d.get('false_positive_rate', 0) * 100

          # Grade detection
          if det >= 90: det_grade = '🟢 Excellent'
          elif det >= 75: det_grade = '🟢 Good'
          elif det >= 60: det_grade = '🟡 Fair'
          else: det_grade = '🔴 Needs Work'

          # Grade FP
          if fp <= 0.1: fp_grade = '🟢 Excellent'
          elif fp <= 0.5: fp_grade = '🟢 Good'
          elif fp <= 1.0: fp_grade = '🟡 Fair'
          else: fp_grade = '🔴 Too High'

          lines = []
          lines.append('## 🎯 Rule Effectiveness (Bench)')
          lines.append('')
          lines.append(f'| Metric | Value | Grade |')
          lines.append(f'|--------|-------|-------|')
          lines.append(f'| Detection Rate | **{det:.1f}%** | {det_grade} |')
          lines.append(f'| False Positive Rate | **{fp:.2f}%** | {fp_grade} |')
          lines.append(f'| Rules Tested | {d.get(\"rule_count\", 0):,} | — |')
          lines.append('')
          lines.append('| Baseline | Type | Size | Matched | Rate |')
          lines.append('|----------|------|------|---------|------|')
          for b in d.get('baselines', []):
              lines.append(f'| {b[\"name\"]} | {b[\"type\"]} | {b[\"size\"]:,} | {b[\"matched\"]:,} | {b[\"rate\"]*100:.1f}% |')

          # Show FP samples if any
          legit_hits = [b for b in d.get('baselines', []) if b['type'] == 'legit' and b.get('sample_matched')]
          if legit_hits:
              lines.append('')
              lines.append('**⚠️ Potential over-blocks (legit domains blocked):**')
              for b in legit_hits:
                  samples = ', '.join(f'\`{s}\`' for s in b['sample_matched'][:5])
                  lines.append(f'- {b[\"name\"]}: {samples}')

          print('\\n'.join(lines))
          " 2>/dev/null || echo "")

          # Save for later injection into release body
          if [ -n "$BENCH_SECTION" ]; then
            printf '%s' "$BENCH_SECTION" > /tmp/bench_section.md
            echo "has_bench=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_bench=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect quality metrics for release body
        id: metrics
        run: |
          REPORT="build-report.json"
          MANIFEST="manifest.json"

          BODY="## 📊 Build Report\n\n"

          if [ -f "$REPORT" ]; then
            TOTAL_RULES=$(python3 -c "
          import json
          d=json.load(open('$REPORT'))
          sources=d.get('sources',[])
          total=sum(s.get('effective',0) for s in sources)
          print(total if total else d.get('total_rules','N/A'))
          " 2>/dev/null || echo "N/A")
            TIMESTAMP=$(python3 -c "import json; d=json.load(open('$REPORT')); print(d.get('finished_at', d.get('timestamp', 'N/A')))" 2>/dev/null || echo "N/A")
            ELAPSED=$(python3 -c "import json; d=json.load(open('$REPORT')); print(f\"{d.get('elapsed_ms',0)/1000:.1f}s\")" 2>/dev/null || echo "N/A")
            BODY="${BODY}| Metric | Value |\n|--------|-------|\n"
            BODY="${BODY}| Total Rules | **${TOTAL_RULES}** |\n"
            BODY="${BODY}| Build Time | ${TIMESTAMP} |\n"
            BODY="${BODY}| Duration | ${ELAPSED} |\n"

            # Efficiency metrics from build-report sources
            #
            # Definitions:
            #   effective = rules that parsed + deduplicated + (optionally) DNS-resolved OK
            #   invalid   = rules that failed to parse / were empty / filtered by length
            #   repeat    = cross-source duplicates (hash already seen from earlier source)
            #   dead      = NXDOMAIN via DNS probe (0 when probe is disabled)
            #
            # raw_total = effective + invalid + repeat + dead
            # efficiency_score = effective / raw_total
            # bloat_ratio = (invalid + repeat + dead) / raw_total
            EFFECTIVE=$(python3 -c "
          import json
          d=json.load(open('$REPORT'))
          sources=d.get('sources',[])
          eff=sum(s.get('effective',0) for s in sources)
          inv=sum(s.get('invalid',0) for s in sources)
          rep=sum(s.get('repeat',0) for s in sources)
          dead=sum(s.get('dead',0) for s in sources)
          raw=eff+inv+rep+dead
          eff_score=eff/raw*100 if raw else 0
          bloat=(inv+rep+dead)/raw*100 if raw else 0
          liveness=eff/(eff+dead)*100 if (eff+dead) else 100
          print(f'{raw}|{eff}|{inv}|{rep}|{dead}|{liveness:.1f}|{bloat:.1f}|{eff_score:.1f}')
          " 2>/dev/null || echo "0|0|0|0|0|0|0|0")

            IFS='|' read -r E_RAW E_EFF E_INVALID E_REPEAT E_DEAD E_LIVENESS E_BLOAT E_SCORE <<< "$EFFECTIVE"

            BODY="${BODY}\n## ⚡ Rule Efficiency\n\n"
            BODY="${BODY}| Metric | Value | Description |\n|--------|-------|-------------|\n"

            # Determine grade
            if (( $(echo "$E_SCORE >= 90" | bc -l 2>/dev/null || echo 0) )); then
              GRADE="🟢 Excellent"
            elif (( $(echo "$E_SCORE >= 75" | bc -l 2>/dev/null || echo 0) )); then
              GRADE="🟢 Good"
            elif (( $(echo "$E_SCORE >= 60" | bc -l 2>/dev/null || echo 0) )); then
              GRADE="🟡 Fair"
            else
              GRADE="🔴 Needs Attention"
            fi

            BODY="${BODY}| Efficiency Score | **${E_SCORE}%** | ${GRADE} |\n"
            BODY="${BODY}| Raw Input | ${E_RAW} | effective + invalid + repeat + dead |\n"
            BODY="${BODY}| Effective | ${E_EFF} | Rules in final output |\n"
            BODY="${BODY}| Invalid (parse) | ${E_INVALID} | Failed to parse or empty |\n"
            BODY="${BODY}| Repeat (cross-src) | ${E_REPEAT} | Hash seen from earlier source |\n"
            BODY="${BODY}| Dead (NXDOMAIN) | ${E_DEAD} | DNS probe failed (0 if probe off) |\n"
            BODY="${BODY}| Liveness Rate | ${E_LIVENESS}% | effective / (effective + dead) |\n"
            BODY="${BODY}| Bloat Ratio | ${E_BLOAT}% | (invalid + repeat + dead) / raw |\n"
          fi

          # Source quality summary
          if [ -f "$REPORT" ]; then
            SOURCE_TABLE=$(python3 -c "
          import json
          d=json.load(open('$REPORT'))
          sources=d.get('sources',[])
          if sources:
              print('| Source | Effective | Invalid | Repeat | Dead | Elapsed |')
              print('|--------|-----------|---------|--------|------|---------|')
              for s in sources:
                  print(f'| {s[\"name\"]} | {s.get(\"effective\",0)} | {s.get(\"invalid\",0)} | {s.get(\"repeat\",0)} | {s.get(\"dead\",0)} | {s.get(\"elapsed_ms\",0)}ms |')
          " 2>/dev/null || echo "")

            if [ -n "$SOURCE_TABLE" ]; then
              BODY="${BODY}\n## 📡 Source Health\n\n"
              BODY="${BODY}${SOURCE_TABLE}\n"
            fi
          fi

          # File sizes table
          BODY="${BODY}\n## 📂 Output Files\n\n"
          BODY="${BODY}| File | Size | Lines |\n|------|------|-------|\n"
          for f in *.txt *.conf *.yaml *.json *.rsc *.html; do
            [ -f "$f" ] || continue
            [ "$f" = "build-report.json" ] && continue
            [ "$f" = "manifest.json" ] && continue
            SIZE=$(du -h "$f" | cut -f1)
            LINES=$(wc -l < "$f")
            BODY="${BODY}| \`$f\` | ${SIZE} | ${LINES} |\n"
          done

          # Manifest integrity info
          if [ -f "$MANIFEST" ]; then
            FILE_COUNT=$(python3 -c "import json; d=json.load(open('$MANIFEST')); print(len(d.get('files', [])))" 2>/dev/null || echo "N/A")
            BODY="${BODY}\n## 🔒 Build Integrity\n\n"
            BODY="${BODY}| Property | Value |\n|----------|-------|\n"
            BODY="${BODY}| Manifest Files | ${FILE_COUNT} |\n"
            BODY="${BODY}| Git Commit | \`${{ github.event.workflow_run.head_sha || github.sha }}\` |\n"
            BODY="${BODY}\n> Verify file integrity with \`manifest.json\` SHA-256 hashes.\n"
          fi

          BODY="${BODY}\n---\n\n"

          # Inject bench results if available
          if [ -f /tmp/bench_section.md ]; then
            BENCH_CONTENT=$(cat /tmp/bench_section.md)
            BODY="${BODY}${BENCH_CONTENT}\n\n---\n\n"
          fi

          BODY="${BODY}🔗 **Subscribe**: Use raw URLs from this release, e.g.:\n"
          BODY="${BODY}\`\`\`\nhttps://github.com/${{ github.repository }}/releases/latest/download/dns.txt\n\`\`\`\n"

          printf '%b' "$BODY" > /tmp/release_body.md

      - name: Delete existing release for today (if re-running)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.date_tag }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

      - name: Create GitHub Release with individual files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.date_tag }}"
          TITLE="${{ steps.tag.outputs.release_name }}"

          FILES=()
          for f in *.txt *.conf *.yaml *.json *.rsc *.html; do
            [ -f "$f" ] || continue
            FILES+=("$f")
          done

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file /tmp/release_body.md \
            --latest \
            "${FILES[@]}"

          echo "✅ Published release: $TITLE with ${#FILES[@]} files"
