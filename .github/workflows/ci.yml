name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.14"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Ruff check
        run: uvx ruff check src/
      - name: Ruff format check
        run: uvx ruff format --check src/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --group dev
      - name: Run tests with coverage
        run: uv run pytest --cov=adfilter --cov-report=xml --cov-report=term -q
      - name: Upload coverage
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --no-dev
      - name: Audit dependencies
        run: uv run pip-audit --strict 2>/dev/null || true
      - name: Validate protected domains list
        run: |
          echo "::group::Protected domains"
          grep -vc '^\s*#\|^\s*$' config/protected_domains.txt || true
          echo "::endgroup::"
      - name: Import smoke test
        run: uv run python -c "from adfilter.security import ContentAuditor; print('Security module OK')"
