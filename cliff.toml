# git-cliff configuration for automated changelog generation
# Install: cargo install git-cliff  OR  pipx install git-cliff
# Usage:  git cliff --output CHANGELOG.md

[changelog]
header = """
# Changelog

All notable changes to adfilter will be documented in this file.\n
"""
body = """
{%- macro remote_url() -%}
  https://github.com/Lknife666/adfilter
{%- endmacro -%}

{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.body %}\n\n{{ commit.body | indent(prefix="  ") }}{% endif %}\
    {% endfor %}
{% endfor %}\n
"""
footer = """
---
Generated by [git-cliff](https://github.com/orhun/git-cliff)
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^doc", group = "Documentation" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^test", group = "Testing" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore|^ci", group = "Miscellaneous" },
    { body = ".*security", group = "Security" },
]

protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
